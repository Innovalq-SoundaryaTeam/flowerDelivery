<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | FloraDaily</title>

    <meta name="description"
        content="Login to your FloraDaily account to shop premium flowers, track orders, and enjoy exclusive offers.">

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/favicon.webp" type="image/webp">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="stylesheet" href="../assets/css/dark-mode.css">

    <link rel="stylesheet" href="../assets/css/rtl.css">

</head>

<body class="auth-page">

    <!-- =========================
         Brand Bar (no full nav on auth pages)
    ========================= -->

    <div class="auth-topbar">

        <a href="index.html" class="navbar-brand d-inline-block">
            <span class="logo-text">FloraDaily</span>
        </a>

    </div>

    <!-- =========================
     Login Header
========================= -->

    <section class="login-header pt-2 pb-1">

        <div class="container">

            <div class="text-center">

                <h1 class="fw-bold">

                    Welcome Back

                </h1>

                <p class="text-muted mt-3 mx-auto" style="max-width:700px;">

                    Sign in to your FloraDaily account to continue shopping,
                    manage your orders, and explore our latest floral
                    collections.

                </p>

            </div>

        </div>

    </section>

    <!-- =========================
     Login Form
========================= -->

    <section class="login-section pb-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-6">

                    <div class="card shadow border-0 rounded-4">

                        <div class="card-body p-5">

                            <div class="text-center mb-4">

                                <h3 class="fw-bold">

                                    Login

                                </h3>

                                <p class="text-muted">

                                    Enter your credentials below.

                                </p>

                            </div>

                            <form id="loginForm">

                                <!-- Email -->

                                <div class="mb-3">

                                    <label class="form-label">

                                        Email Address

                                    </label>

                                    <input type="email" id="loginEmail" class="form-control"
                                        placeholder="Enter your email">

                                    <small id="loginEmailError" class="text-danger d-none">

                                    </small>

                                </div>

                                <!-- Password -->

                                <div class="mb-3">

                                    <label class="form-label">

                                        Password

                                    </label>

                                    <div class="input-group">

                                        <input type="password" id="loginPassword" class="form-control"
                                            placeholder="Enter your password">

                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggleLoginPassword">

                                            <i class="fa-solid fa-eye"></i>

                                        </button>

                                    </div>

                                    <small id="loginPasswordError" class="text-danger d-none">

                                    </small>

                                </div>

                                <!-- Remember Me -->

                                <div class="d-flex justify-content-between align-items-center mb-4">

                                    <div class="form-check">

                                        <input class="form-check-input" type="checkbox" id="rememberMe">

                                        <label class="form-check-label" for="rememberMe">

                                            Remember Me

                                        </label>

                                    </div>

                                    <a href="forgot-password.html" class="text-decoration-none">

                                        Forgot Password?

                                    </a>

                                </div>

                                <!-- Success -->

                                <div id="loginSuccess" class="alert alert-success d-none">

                                    <i class="fa-solid fa-circle-check me-2"></i>

                                    Login Successful!

                                </div>

                                <!-- Button -->

                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">

                                    Login

                                </button>

                            </form>

                            <div class="text-center mt-4" id="createAccountLink">

                                Don't have an account?

                                <a href="register.html" class="fw-semibold text-decoration-none">

                                    Create One

                                </a>

                            </div>

                            <!-- Social Login -->

                            <div class="auth-divider my-4">
                                <span>or continue with</span>
                            </div>

                            <div class="d-flex gap-3">

                                <button type="button" class="btn btn-outline-secondary w-100 rounded-pill social-btn"
                                    id="googleLoginBtn">
                                    <i class="fa-brands fa-google me-2"></i> Google
                                </button>

                                <button type="button" class="btn btn-outline-dark w-100 rounded-pill social-btn"
                                    id="appleLoginBtn">
                                    <i class="fa-brands fa-apple me-2"></i> Apple
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->

    <script src="../assets/js/main.js"></script>

    <!-- Social Login (demo placeholders) -->

    <script>

        (function () {

            const googleBtn = document.getElementById("googleLoginBtn");
            const appleBtn = document.getElementById("appleLoginBtn");

            if (googleBtn) {
                googleBtn.addEventListener("click", () => {
                    alert("Google sign-in isn't connected to a real provider in this demo.");
                });
            }

            if (appleBtn) {
                appleBtn.addEventListener("click", () => {
                    alert("Apple sign-in isn't connected to a real provider in this demo.");
                });
            }

        })();

    </script>

</body>

</html>
