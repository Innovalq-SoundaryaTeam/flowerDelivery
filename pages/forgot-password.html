<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | FloraDaily</title>

    <meta name="description" content="Reset your FloraDaily account password.">

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/logo-icon.svg" type="image/svg+xml">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="stylesheet" href="../assets/css/dashboard-dark.css">

</head>

<body class="auth-page">

    <!-- =========================
         Brand Bar (no full nav on auth pages)
    ========================= -->

    <div class="auth-topbar">

        <a href="index.html" class="navbar-brand d-inline-block">
            <img src="../assets/images/logo-icon.svg" alt="FloraDaily logo" class="brand-logo-icon"><span class="logo-text">FloraDaily</span>
        </a>

    </div>

    <main>

        <!--=====================================
        FORGOT PASSWORD
======================================-->

        <section class="auth-section py-5">

            <div class="container">

                <div class="row align-items-center auth-card">

                    <div class="col-lg-6">

                        <span class="dashboard-badge">

                            <i class="fa-solid fa-key me-2"></i>

                            Password Recovery

                        </span>

                        <h1 class="auth-title">

                            Forgot Password?

                        </h1>

                        <p class="auth-description">

                            Don't worry! Enter your registered email address and we'll send you instructions to reset
                            your password.

                        </p>

                        <form id="forgotPasswordForm">

                            <div class="mb-4">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <input type="email" class="form-control" id="forgotEmail"
                                    placeholder="Enter your email">

                                <small id="forgotEmailError" class="text-danger">

                                </small>

                            </div>

                            <button type="submit" class="btn btn-primary w-100 auth-btn">

                                <i class="fa-solid fa-paper-plane me-2"></i>

                                Send Reset Link

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            <a href="login.html" class="back-login">

                                <i class="fa-solid fa-arrow-left me-2"></i>

                                Back to Login

                            </a>

                        </div>

                    </div>

                    <div class="col-lg-6 text-center">

                        <img src="../assets/images/forgot-password-banner.webp" class="img-fluid forgot-banner"
                            alt="Forgot Password">

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/dashboard.js"></script>

</body>

</html>
